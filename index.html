<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOT_G SmartMath - Interactive Graph Learning</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.page {
  display: none;
  animation: fadeIn 0.5s ease-in;
}

.page.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.card {
  background: white;
  padding: 40px;
  border-radius: 16px;
  max-width: 800px;
  margin: 30px auto;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

.card h1 {
  color: #667eea;
  margin-bottom: 10px;
  font-size: 2.5em;
}

.card h2 {
  color: #667eea;
  margin: 20px 0 15px 0;
  font-size: 1.8em;
}

.card h3 {
  color: #764ba2;
  margin: 15px 0 10px 0;
  font-size: 1.3em;
}

.card p {
  color: #555;
  line-height: 1.8;
  margin: 12px 0;
}

button {
  padding: 12px 24px;
  margin: 10px 5px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

input, textarea, select {
  padding: 12px;
  margin: 10px 0;
  width: 100%;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 1em;
  font-family: inherit;
  transition: border-color 0.3s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #667eea;
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.lang-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 20px 0;
}

.lang-btn {
  padding: 10px 20px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s;
}

.lang-btn.active {
  background: #667eea;
  color: white;
}

.lang-btn:hover {
  transform: scale(1.05);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 15px 30px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.topbar h3 {
  color: #667eea;
  margin: 0;
}

.topbar button {
  padding: 8px 16px;
  font-size: 0.9em;
  margin: 0;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin: 20px 0;
}

.stat-box {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  border-left: 4px solid #667eea;
}

.stat-box h4 {
  color: #999;
  font-size: 0.9em;
  margin-bottom: 5px;
}

.stat-box .value {
  font-size: 1.8em;
  font-weight: bold;
  color: #667eea;
}

.difficulty-buttons {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 20px 0;
}

.difficulty-btn {
  padding: 15px;
  border: 2px solid #ddd;
  background: white;
  color: #667eea;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
  font-size: 0.95em;
}

.difficulty-btn:hover {
  border-color: #667eea;
  transform: translateY(-2px);
}

.difficulty-btn.selected {
  background: #667eea;
  color: white;
  border-color: #667eea;
}

.difficulty-btn.easy { border-left: 4px solid #4caf50; }
.difficulty-btn.medium { border-left: 4px solid #ff9800; }
.difficulty-btn.hard { border-left: 4px solid #f44336; }

.question-box {
  background: #f9f9f9;
  padding: 20px;
  border-radius: 8px;
  border-left: 4px solid #667eea;
  margin: 20px 0;
}

.result {
  margin-top: 15px;
  padding: 15px;
  border-radius: 8px;
  font-weight: 600;
  text-align: center;
}

.result.correct {
  background: #d4edda;
  color: #155724;
  border: 1px solid #c3e6cb;
}

.result.wrong {
  background: #f8d7da;
  color: #721c24;
  border: 1px solid #f5c6cb;
}

.shape-options {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 20px 0;
}

.shape-option {
  padding: 15px;
  background: #f5f5f5;
  border: 2px solid transparent;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
  color: #667eea;
  text-align: center;
}

.shape-option:hover {
  border-color: #667eea;
  transform: translateY(-3px);
}

.shape-option.selected {
  background: #667eea;
  color: white;
  border-color: #667eea;
}

canvas {
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  margin: 20px 0;
  width: 100%;
  max-width: 400px;
  display: block;
  margin-left: auto;
  margin-right: auto;
  background: white;
}

.button-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 20px 0;
}

.button-group.full {
  grid-template-columns: 1fr;
}

.emoji {
  font-size: 1.2em;
  margin-right: 8px;
}

.ai-tutor-container {
  background: #f9f9f9;
  border-radius: 8px;
  padding: 20px;
  max-height: 400px;
  overflow-y: auto;
  margin: 15px 0;
}

.message {
  margin: 10px 0;
  padding: 12px;
  border-radius: 8px;
  word-wrap: break-word;
}

.message.student {
  background: #667eea;
  color: white;
  margin-left: 20px;
  text-align: right;
  border-radius: 8px;
}

.message.tutor {
  background: #e8f1ff;
  color: #333;
  margin-right: 20px;
  border-left: 4px solid #667eea;
  border-radius: 8px;
}

.suggested-topics {
  background: #f0f7ff;
  padding: 15px;
  border-radius: 8px;
  margin: 15px 0;
  border-left: 4px solid #667eea;
}

.suggested-topics h5 {
  color: #667eea;
  margin-bottom: 12px;
  font-size: 0.95em;
}

.suggested-topics button {
  display: block;
  width: 100%;
  text-align: left;
  margin: 8px 0;
  padding: 10px;
  background: white;
  color: #667eea;
  border: 1px solid #667eea;
  font-weight: 600;
  border-radius: 6px;
}

.suggested-topics button:hover {
  background: #667eea;
  color: white;
}

.progress-bar {
  width: 100%;
  height: 8px;
  background: #e0e0e0;
  border-radius: 4px;
  margin: 15px 0;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
  transition: width 0.3s ease;
}

.hint-box {
  background: #fff3cd;
  padding: 15px;
  border-radius: 8px;
  border-left: 4px solid #ffc107;
  margin: 15px 0;
  color: #856404;
}

</style>

</head>
<body>

<!-- LANGUAGE SELECTION PAGE -->
<div id="langSelection" class="page active">
  <div class="card">
    <h1>🧮 MyOT_G SmartMath</h1>
    <p style="font-size: 1.1em; margin-bottom: 30px; color: #667eea; font-weight: 600;" id="subtitleLang"></p>
    
    <div class="lang-selector">
      <button class="lang-btn" onclick="setLanguage('en')">
        🇬🇧 English
      </button>
      <button class="lang-btn" onclick="setLanguage('my')">
        🇲🇾 Bahasa Melayu
      </button>
    </div>
  </div>
</div>

<!-- LOGIN PAGE -->
<div id="login" class="page">
  <div class="card">
    <h1><span class="emoji">🧮</span>MyOT_G SmartMath</h1>
    <p id="loginSubtitle"></p>

    <input type="text" id="studentName" placeholder="">
    <br>

    <button onclick="login()">
      <span id="loginBtnText"></span>
    </button>

    <button onclick="setLanguage(null)">
      <span id="changeLangText"></span>
    </button>
  </div>
</div>

<!-- MAIN MENU PAGE -->
<div id="mainMenu" class="page">
  <div class="topbar">
    <div>
      <h3 id="welcomeText"></h3>
      <p id="studentNameDisplay" style="color: #667eea; font-weight: 600;"></p>
    </div>
    <div style="text-align: right;">
      <div style="color: #667eea; font-weight: 600; font-size: 1.1em; margin-bottom: 10px;">
        <span id="scoreLabel"></span>: <span id="totalScore">0</span> | <span id="levelLabel"></span>: <span id="currentLevel">1</span>
      </div>
      <button onclick="logout()" style="padding: 8px 16px; font-size: 0.9em;">
        <span id="logoutBtnText"></span>
      </button>
    </div>
  </div>

  <div class="card">
    <h2 id="menuTitle"></h2>

    <div class="button-group full">
      <button onclick="goToPage('graphQuiz')">
        <span class="emoji">📊</span><span id="graphQuizText"></span>
      </button>
      <button onclick="goToPage('shapeGame')">
        <span class="emoji">🎨</span><span id="shapeGameText"></span>
      </button>
    </div>

    <div class="button-group full">
      <button onclick="goToPage('aiTutor')">
        <span class="emoji">🤖</span><span id="aiTutorText"></span>
      </button>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 20%;"></div>
    </div>
  </div>
</div>

<!-- GRAPH QUIZ PAGE -->
<div id="graphQuiz" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="graphQuizTitle"></h2>
    <p id="graphQuizDesc"></p>

    <h3 id="difficultySelectText"></h3>
    <div class="difficulty-buttons" id="difficultyButtons"></div>

    <div id="quizContent"></div>

    <button onclick="submitQuizAnswer()" style="width: 100%; margin-top: 20px; display: none;" id="submitQuizBtn">
      <span id="submitText"></span>
    </button>
  </div>
</div>

<!-- SHAPE GUESSING GAME PAGE -->
<div id="shapeGame" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="shapeGameTitle"></h2>
    <p id="shapeGameDesc"></p>

    <div style="text-align: center; margin: 20px 0;">
      <p id="shapeInstruction"></p>
      <canvas id="shapeCanvas" width="350" height="350"></canvas>
    </div>

    <div class="shape-options" id="shapeOptions"></div>

    <div id="shapeResult"></div>

    <button onclick="nextShapeGame()" style="width: 100%; margin-top: 20px; display: none;" id="nextShapeBtn">
      <span id="nextText"></span>
    </button>
  </div>
</div>

<!-- AI TUTOR PAGE -->
<div id="aiTutor" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="aiTutorTitle"></h2>
    <p id="aiTutorDesc"></p>

    <div class="ai-tutor-container" id="chatContainer">
      <div class="message tutor" id="welcomeMessage"></div>
    </div>

    <textarea id="studentQuestion" placeholder=""></textarea>
    <br>

    <button onclick="sendQuestion()">
      <span class="emoji">➤</span><span id="sendText"></span>
    </button>

    <div class="suggested-topics">
      <h5 id="suggestedTopicsLabel"></h5>
      <div id="suggestedTopics"></div>
    </div>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
