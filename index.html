<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyOT_G SmartMath - AI-Powered Interactive Mathematics Learning</title>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 20px;
}

.page {
  display: none;
  animation: fadeIn 0.5s ease-in;
}

.page.active {
  display: block;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.card {
  background: white;
  padding: 40px;
  border-radius: 16px;
  max-width: 700px;
  margin: 30px auto;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

.card h1 {
  color: #667eea;
  margin-bottom: 10px;
  font-size: 2.5em;
}

.card h2 {
  color: #667eea;
  margin: 20px 0 15px 0;
  font-size: 1.8em;
}

.card h3 {
  color: #764ba2;
  margin: 15px 0 10px 0;
  font-size: 1.3em;
}

.card p {
  color: #555;
  line-height: 1.8;
  margin: 12px 0;
}

button {
  padding: 12px 24px;
  margin: 10px 5px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1em;
  font-weight: 600;
  transition: transform 0.2s, box-shadow 0.2s;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

input, textarea, select {
  padding: 12px;
  margin: 10px 0;
  width: 100%;
  border: 2px solid #e0e0e0;
  border-radius: 8px;
  font-size: 1em;
  font-family: inherit;
  transition: border-color 0.3s;
}

input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: #667eea;
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.lang-selector {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin: 20px 0;
}

.lang-btn {
  padding: 10px 20px;
  border: 2px solid #667eea;
  background: white;
  color: #667eea;
  font-weight: 600;
  cursor: pointer;
  border-radius: 8px;
  transition: all 0.3s;
}

.lang-btn.active {
  background: #667eea;
  color: white;
}

.lang-btn:hover {
  transform: scale(1.05);
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 15px 30px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
}

.topbar h3 {
  color: #667eea;
  margin: 0;
}

.topbar button {
  padding: 8px 16px;
  font-size: 0.9em;
  margin: 0;
}

.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin: 20px 0;
}

.stat-box {
  background: #f5f5f5;
  padding: 15px;
  border-radius: 8px;
  text-align: center;
  border-left: 4px solid #667eea;
}

.stat-box h4 {
  color: #999;
  font-size: 0.9em;
  margin-bottom: 5px;
}

.stat-box .value {
  font-size: 1.8em;
  font-weight: bold;
  color: #667eea;
}

.diagnostic-question {
  background: #f0f7ff;
  padding: 20px;
  border-radius: 8px;
  border-left: 4px solid #667eea;
  margin: 15px 0;
}

.diagnostic-question p {
  font-size: 1.1em;
  font-weight: 600;
  color: #333;
  margin-bottom: 15px;
}

.confidence-scale {
  display: flex;
  gap: 10px;
  margin: 15px 0;
}

.confidence-btn {
  flex: 1;
  padding: 12px;
  border: 2px solid #ddd;
  background: white;
  color: #666;
  border-radius: 8px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.3s;
}

.confidence-btn:hover {
  border-color: #667eea;
}

.confidence-btn.selected {
  background: #667eea;
  color: white;
  border-color: #667eea;
}

.difficulty-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 15px;
  margin: 20px 0;
}

.difficulty-card {
  background: #f5f5f5;
  padding: 20px;
  border-radius: 8px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s;
  border: 2px solid transparent;
}

.difficulty-card:hover {
  transform: translateY(-5px);
  border-color: #667eea;
  box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
}

.difficulty-card h4 {
  color: #667eea;
  margin-bottom: 10px;
  font-size: 1.2em;
}

.difficulty-card p {
  font-size: 0.9em;
  color: #999;
}

.error-analysis {
  background: #fff3cd;
  padding: 20px;
  border-radius: 8px;
  border-left: 4px solid #ffc107;
  margin: 15px 0;
}

.error-analysis h4 {
  color: #856404;
  margin-bottom: 10px;
}

.error-type {
  background: white;
  padding: 10px;
  border-radius: 6px;
  margin: 8px 0;
  border-left: 3px solid #ffc107;
}

.hint-box {
  background: #d1ecf1;
  padding: 15px;
  border-radius: 8px;
  border-left: 4px solid #17a2b8;
  margin: 15px 0;
}

.hint-box h5 {
  color: #0c5460;
  margin-bottom: 10px;
}

.hint-box p {
  color: #0c5460;
  margin: 8px 0;
}

.success-message {
  background: #d4edda;
  padding: 15px;
  border-radius: 8px;
  border-left: 4px solid #28a745;
  margin: 15px 0;
  color: #155724;
  font-weight: 600;
}

.geogebra-workspace {
  background: #f9f9f9;
  padding: 20px;
  border-radius: 8px;
  border: 2px solid #e0e0e0;
  margin: 15px 0;
  min-height: 300px;
  text-align: center;
}

.geogebra-workspace p {
  color: #999;
  font-style: italic;
  margin-top: 100px;
}

.challenge-card {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  padding: 25px;
  border-radius: 12px;
  margin: 15px 0;
}

.challenge-card h3 {
  color: white;
  margin-bottom: 10px;
}

.challenge-card p {
  color: rgba(255, 255, 255, 0.9);
  line-height: 1.6;
}

.button-group {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 20px 0;
}

.button-group.full {
  grid-template-columns: 1fr;
}

.emoji {
  font-size: 1.2em;
  margin-right: 8px;
}

.progress-indicator {
  background: #e0e0e0;
  height: 8px;
  border-radius: 4px;
  overflow: hidden;
  margin: 15px 0;
}

.progress-fill {
  background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
  height: 100%;
  transition: width 0.3s ease;
}

.question-box {
  background: #f9f9f9;
  padding: 20px;
  border-radius: 8px;
  border-left: 4px solid #667eea;
  margin: 20px 0;
}

.input-group {
  margin: 15px 0;
}

.input-group label {
  display: block;
  font-weight: 600;
  color: #333;
  margin-bottom: 8px;
}

.real-life-scenario {
  background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
  padding: 25px;
  border-radius: 12px;
  margin: 15px 0;
  border-left: 4px solid #4caf50;
}

.real-life-scenario h4 {
  color: #2e7d32;
  margin-bottom: 15px;
}

.real-life-scenario p {
  color: #1b5e20;
  line-height: 1.8;
}

</style>

</head>
<body>

<!-- LANGUAGE SELECTION PAGE -->
<div id="langSelection" class="page active">
  <div class="card">
    <h1>🧮 MyOT_G SmartMath</h1>
    <p style="font-size: 1.1em; margin-bottom: 30px; color: #667eea; font-weight: 600;">Sistem Pembelajaran Matematik Interaktif Berasaskan AI</p>
    
    <div class="lang-selector">
      <button class="lang-btn" onclick="setLanguage('en')">
        🇬🇧 English
      </button>
      <button class="lang-btn" onclick="setLanguage('my')">
        🇲🇾 Bahasa Melayu
      </button>
    </div>
  </div>
</div>

<!-- LOGIN PAGE -->
<div id="login" class="page">
  <div class="card">
    <h1><span class="emoji">🧮</span>MyOT_G SmartMath</h1>
    <p id="loginSubtitle"></p>

    <input type="text" id="studentName" placeholder="">
    <br>

    <button onclick="login()">
      <span id="loginBtnText"></span>
    </button>

    <button onclick="setLanguage(null)">
      <span id="changeLangText"></span>
    </button>
  </div>
</div>

<!-- DIAGNOSTIC TEST PAGE -->
<div id="diagnostic" class="page">
  <div class="topbar">
    <div>
      <h3 id="diagnosticTitle"></h3>
      <p id="studentNameDisplay" style="color: #667eea; font-weight: 600;"></p>
    </div>
  </div>

  <div class="card">
    <h2 id="diagnosticSubtitle"></h2>
    <p id="diagnosticDesc"></p>

    <div id="diagnosticContent"></div>

    <button onclick="continueDiagnostic()" style="width: 100%;">
      <span id="nextBtnText"></span>
    </button>
  </div>
</div>

<!-- MAIN MENU PAGE -->
<div id="mainMenu" class="page">
  <div class="topbar">
    <div>
      <h3 id="welcomeText"></h3>
      <p id="studentNameMenuDisplay" style="color: #667eea; font-weight: 600;"></p>
    </div>
    <div style="text-align: right;">
      <div style="color: #667eea; font-weight: 600; font-size: 1.1em;">
        <span id="levelText"></span>: <span id="currentLevel">1</span> | 
        <span id="pointsText"></span>: <span id="totalPoints">0</span>
      </div>
      <button onclick="logout()" style="padding: 8px 16px; font-size: 0.9em; margin-top: 10px;">
        <span id="logoutBtnText"></span>
      </button>
    </div>
  </div>

  <div class="card">
    <h2 id="menuTitle"></h2>

    <h3 id="learningModesTitle"></h3>
    <div class="button-group full">
      <button onclick="goToPage('adaptiveLearning')">
        <span class="emoji">🎯</span><span id="adaptiveText"></span>
      </button>
      <button onclick="goToPage('geogebraMode')">
        <span class="emoji">📊</span><span id="geogebraText"></span>
      </button>
    </div>

    <div class="button-group full">
      <button onclick="goToPage('escapeRoom')">
        <span class="emoji">🔓</span><span id="escapeRoomText"></span>
      </button>
      <button onclick="goToPage('realLife')">
        <span class="emoji">🌍</span><span id="realLifeText"></span>
      </button>
    </div>

    <h3 id="advancedFeaturesTitle"></h3>
    <div class="button-group full">
      <button onclick="goToPage('collaborativeBoard')">
        <span class="emoji">👥</span><span id="collaborativeText"></span>
      </button>
      <button onclick="goToPage('arScanner')">
        <span class="emoji">📱</span><span id="arText"></span>
      </button>
    </div>
  </div>
</div>

<!-- ADAPTIVE LEARNING PAGE -->
<div id="adaptiveLearning" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="adaptiveTitle"></h2>
    <p id="adaptiveDesc"></p>

    <div id="difficultySelector"></div>

    <div id="adaptiveContent"></div>

    <button onclick="submitAdaptiveAnswer()" style="width: 100%; margin-top: 20px;">
      <span id="submitText"></span>
    </button>
  </div>
</div>

<!-- GEOGEBRA MODE PAGE -->
<div id="geogebraMode" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="geogebraTitle"></h2>
    <p id="geogebraDesc"></p>

    <div class="geogebra-workspace" id="geogebraWorkspace">
      <p id="geogebraPlaceholder"></p>
    </div>

    <button onclick="goToPage('mainMenu')" style="width: 100%;">
      <span id="backToMenuText"></span>
    </button>
  </div>
</div>

<!-- ESCAPE ROOM PAGE -->
<div id="escapeRoom" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="escapeRoomTitle"></h2>

    <div class="challenge-card" id="challengeDisplay"></div>

    <div id="escapeRoomContent"></div>

    <button onclick="submitEscapeRoomAnswer()" style="width: 100%; margin-top: 20px;">
      <span id="submitText"></span>
    </button>
  </div>
</div>

<!-- REAL-LIFE MATHEMATICS PAGE -->
<div id="realLife" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="realLifeTitle"></h2>
    <p id="realLifeDesc"></p>

    <div class="input-group">
      <label id="careerSelectLabel"></label>
      <select id="careerSelect" onchange="loadRealLifeScenario()">
        <option value="">-- <span id="selectCareerText"></span> --</option>
      </select>
    </div>

    <div id="realLifeScenario"></div>

    <button onclick="submitRealLifeAnswer()" style="width: 100%; margin-top: 20px;">
      <span id="submitText"></span>
    </button>
  </div>
</div>

<!-- COLLABORATIVE BOARD PAGE -->
<div id="collaborativeBoard" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="collaborativeTitle"></h2>
    <p id="collaborativeDesc"></p>

    <div style="background: #f0f7ff; padding: 20px; border-radius: 8px; margin: 20px 0; min-height: 250px;">
      <p id="collaborativePlaceholder" style="color: #999; text-align: center; margin-top: 100px;"></p>
    </div>

    <button onclick="goToPage('mainMenu')" style="width: 100%;">
      <span id="backToMenuText"></span>
    </button>
  </div>
</div>

<!-- AR SCANNER PAGE -->
<div id="arScanner" class="page">
  <div class="card">
    <button onclick="goToPage('mainMenu')" style="float: right; padding: 8px 16px; font-size: 0.9em;">
      ← <span id="backText"></span>
    </button>
    
    <h2 id="arTitle"></h2>
    <p id="arDesc"></p>

    <div style="background: #f0f7ff; padding: 40px; border-radius: 8px; margin: 20px 0; text-align: center;">
      <p style="font-size: 3em; margin: 20px 0;">📱</p>
      <p id="arPlaceholder" style="color: #667eea; font-weight: 600;"></p>
    </div>

    <button onclick="goToPage('mainMenu')" style="width: 100%;">
      <span id="backToMenuText"></span>
    </button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
